name: Generovat log index

on:
  push:
    branches: [main]
    paths:
      - 'log/**.md'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Spustit generátor
        run: python3 generate_log_index.py

      - name: Commitnout log.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add log/log.json
          git diff --staged --quiet || git commit -m "auto: regenerace log/log.json"
          git push
